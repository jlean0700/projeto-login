<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tela de Login</title>
   <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="estilos/style.css">
    <link rel="stylesheet" href="estilos/media-queries.css">

   <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">


</head>
<body>
    <main>
        <section id="login">

            <div id="imagem">
                <!-- Imagem de fundo -->
            </div>


            <div id="formulario">
                <h1>Login</h1>
                
                <p>Seja bem-vindo(a) novaemente. faça login para acessar sua conta e poder fazer operações no seu ambiente virtual.</p>

                <form action="login.php" method="post" autocomplete="on">

                    <div class="campo">
                    
                         <span class="material-icons">person</span>

                        <label for="ilogin">E-mail:</label>

                        <input type="email" id="ilogin" name="ilogin" required placeholder="e-mail" autocomplete="email" maxlength="30">

                    </div>

                    <div class="campo">
                        
                         <span class="material-icons">vpn_key</span>

                        <label for="senha">Senha:</label>

                        <input type="password" id="senha" name="senha" required minlength="6" maxlength="20" 
                        placeholder="senha"
                        autocomplete="current-password">
                    </div>

                    <button type="submit">Entrar</button>

                   <a href="#esqueci-senha">Esqueceu a senha? <span class="material-icons">help</span> </a>

                </form>

                

            </div>

        </section>
    </main>
</body>
</html>
